name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: elixir:1.19.5-otp-28-slim
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      MIX_ENV: test
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
    defaults:
      run:
        working-directory: apps/platform

    steps:
      - uses: actions/checkout@v5

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential ca-certificates git
          update-ca-certificates

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: apps/platform/deps
          key: deps-${{ hashFiles('apps/platform/mix.lock') }}
          restore-keys: deps-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Set up database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Run tests
        run: mix test

  build-and-push:
    name: Build and push image
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Derive image tags
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # Derive a docker-safe branch tag: refs/heads/feat/reskin → feat-reskin
          BRANCH_TAG="${GITHUB_REF#refs/heads/}"
          BRANCH_TAG="${BRANCH_TAG//\//-}"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: apps/platform
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/startup-suite/core:latest
            ghcr.io/startup-suite/core:${{ github.sha }}
            ghcr.io/startup-suite/core:${{ steps.vars.outputs.short_sha }}

      - name: Build and push (feature branch)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: apps/platform
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/startup-suite/core:${{ steps.vars.outputs.branch_tag }}
            ghcr.io/startup-suite/core:${{ github.sha }}
            ghcr.io/startup-suite/core:${{ steps.vars.outputs.short_sha }}
