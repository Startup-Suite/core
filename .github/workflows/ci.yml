name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: elixir:1.19.5-otp-28-slim
    defaults:
      run:
        working-directory: apps/platform

    steps:
      - uses: actions/checkout@v5

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential ca-certificates git
          update-ca-certificates

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: apps/platform/deps
          key: deps-${{ hashFiles('apps/platform/mix.lock') }}
          restore-keys: deps-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test

  build-and-push:
    name: Build and push image
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Derive image tags
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: apps/platform
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/startup-suite/core:latest
            ghcr.io/startup-suite/core:${{ github.sha }}
            ghcr.io/startup-suite/core:${{ steps.vars.outputs.short_sha }}
