# Local development services for Startup Suite Core.
#
# This file is intentionally minimal — just a Postgres 16 container that the
# Phoenix dev/test config can talk to with no overrides. Bring it up with:
#
#   docker compose up -d postgres
#
# Defaults (postgres / postgres / localhost:5432 / platform_dev) match
# apps/platform/config/dev.exs. To use a different host port (e.g. if 5432 is
# taken), edit the ports mapping below and export PGPORT before running mix.
#
# This file is for local development only. Production uses container images and
# orchestration defined under deployment/ — not this compose stack.

services:
  postgres:
    image: postgres:16
    container_name: suite-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform_dev
    ports:
      - "5432:5432"
    volumes:
      - suite-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  suite-dev-postgres-data:
